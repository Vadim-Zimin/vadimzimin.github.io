<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vadim Zimin | Ground Truth</title>
    
    <!-- Подключение шрифта Source Serif 4 из Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">

    <style>
        /* Базовые параметры страницы и градиент */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Source Serif 4', 'Georgia', serif;
            background: linear-gradient(to bottom, #dbe9f6 0%, #1d5fa0 40%, #030e1b 100%);
            box-sizing: border-box;
        }

        /* Главный заголовок: строго одинаковые отступы сверху и справа */
        .title-container {
            position: absolute;
            top: 80px;
            right: 80px;
            text-align: right;
            color: #000000;
        }

        h1 {
            font-weight: 400;
            font-size: 16pt; /* Размер кегля строго 16 */
            margin: 0;
            line-height: 1.2;
        }

        /* Ссылка меню в левом нижнем углу на английском */
        .menu-link {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14pt; /* Размер кегля строго 14 */
            font-weight: 400;
            opacity: 0.85;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        /* Интерактивный эффект при наведении */
        .menu-link:hover {
            opacity: 1;
            transform: translateY(-1px);
        }

        /* Адаптивная подстройка под небольшие экраны смартфонов */
        @media (max-width: 768px) {
            .title-container {
                top: 40px;
                right: 40px;
                left: 40px;
                text-align: center;
            }
            .menu-link {
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
            }
            .menu-link:hover {
                transform: translateX(-50%) translateY(-1px);
            }
        }
    </style>
</head>
<body>

    <!-- Главный заголовок проекта -->
    <div class="title-container">
        <h1>Vadim Zimin | Ground Truth</h1>
    </div>

    <!-- Ссылка-меню на английском языке -->
    <a href="#menu" class="menu-link">menu</a>

</body>
</html>
